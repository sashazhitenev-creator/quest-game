<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>КВЕСТ — текстовое AI-приключение</title>
<meta name="description" content="Текстовая приключенческая игра, где мир генерируется нейросетью на ходу. Пиши любые действия — игра решит, чем это кончится.">
<style>
  :root {
    --amber: #ffb347;
    --dim: #8a6a3a;
    --bg: #0d0a05;
    --green: #7dff9a;
    --red: #ff6b6b;
  }
  * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--dim) var(--bg); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--amber); }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--amber);
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    border-bottom: 1px solid var(--dim);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }
  #title { letter-spacing: 2px; font-weight: bold; }
  #statusbar { font-size: 13px; }
  #menu {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #logo { font-size: 34px; letter-spacing: 10px; font-weight: bold; margin-bottom: 6px; text-shadow: 0 0 12px rgba(255,179,71,.4); }
  .sub { color: var(--dim); max-width: 420px; font-size: 14px; line-height: 1.6; }
  #genres { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 380px; margin-top: 12px; }
  .modes { display: flex; gap: 8px; width: 100%; max-width: 380px; margin-top: 4px; }
  .mode-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .mode-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(125,255,154,.07);
  }
  .mode-hint { color: var(--dim); font-size: 12px; margin-top: 6px; }
  .genre-btn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--amber);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
  }
  .genre-btn:hover { border-color: var(--amber); background: rgba(255,179,71,.07); }
  .genre-btn b { display: inline; }
  .genre-btn small { color: var(--dim); margin-left: 8px; font-size: 12px; }
  #game { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .entry { margin-bottom: 14px; line-height: 1.65; font-size: 15px; white-space: pre-wrap; }
  .entry.player { color: var(--green); }
  .entry.sys { color: var(--red); }
  #thinking { color: var(--dim); font-size: 14px; display: none; }
  #inputbar {
    border-top: 1px solid var(--dim);
    padding: 12px 16px;
    display: none;
    gap: 10px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  #prompt-char { color: var(--green); align-self: center; }
  #action {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: inherit;
    font-size: 16px;
  }
  #send {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--amber);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
  }
  #send:disabled { color: var(--dim); cursor: default; }
  #endscreen {
    border: 1px solid var(--red);
    padding: 16px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }
  #endscreen.victory { border-color: var(--green); color: var(--green); }
  #endscreen.death { border-color: var(--red); color: var(--red); }
  #end-title { font-size: 18px; letter-spacing: 3px; margin-bottom: 8px; }
  #end-text { font-size: 14px; }
  #end-turns { color: var(--dim); font-size: 12px; margin-top: 8px; }
  #restart {
    margin-top: 14px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--amber);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 20px;
    cursor: pointer;
  }
  .hp-ok { color: var(--green); }
  .hp-mid { color: var(--amber); }
  .hp-low { color: var(--red); }
</style>
</head>
<body>

<div id="topbar">
  <span id="title">▓ КВЕСТ</span>
  <span id="statusbar"></span>
</div>

<div id="menu">
  <div id="logo">КВЕСТ</div>
  <p class="sub">Текстовое приключение. Мир генерируется нейросетью на ходу.<br>Пиши любые действия — игра решит, чем это кончится.</p>
  <p style="font-size:13px; letter-spacing:1px;">» ТИП ИГРЫ «</p>
  <div class="modes" style="margin-bottom:2px;">
    <button class="mode-btn active" id="type-story">СЮЖЕТ</button>
    <button class="mode-btn" id="type-endless">БЕСКОНЕЧНЫЙ</button>
  </div>
  <div class="mode-hint" id="type-hint">скрытая цель, кульминация и финал</div>
  <p style="font-size:13px; letter-spacing:1px; margin-top:20px;">» РЕЖИМ ПОВЕСТВОВАНИЯ «</p>
  <div class="modes">
    <button class="mode-btn active" id="mode-detailed">ПОДРОБНЫЙ</button>
    <button class="mode-btn" id="mode-simple">ПРОСТОЙ</button>
  </div>
  <div class="mode-hint" id="mode-hint">атмосферные описания, детали мира</div>
  <p style="font-size:13px; letter-spacing:1px; margin-top:20px;">» ВЫБЕРИ МИР «</p>
  <div id="genres"></div>
</div>

<div id="game">
  <div id="log">
    <div id="thinking">мир думает<span id="dots">.</span></div>
    <div id="endscreen">
      <div id="end-title"></div>
      <div id="end-text"></div>
      <div id="end-turns"></div>
      <button id="restart">НОВАЯ ИГРА</button>
    </div>
  </div>
  <div id="inputbar">
    <span id="prompt-char">&gt;</span>
    <input id="action" placeholder="что делаешь?" autocomplete="off" maxlength="500">
    <button id="send">ВВОД</button>
  </div>
</div>

<script>
const API_URL = "/.netlify/functions/chat";

const GENRES = [
  { id: "forest", label: "Тёмный лес", hint: "классика: просыпаешься в лесу" },
  { id: "space", label: "Заброшенный корабль", hint: "sci-fi ужас в космосе" },
  { id: "cyberpunk", label: "Неоновый город", hint: "киберпанк, хакеры, импланты" },
  { id: "dungeon", label: "Подземелье", hint: "фэнтези, ловушки, сокровища" },
  { id: "random", label: "Случайный мир", hint: "пусть игра решит сама" },
];

let history = [];
let hp = 100;
let turn = 0;
let loading = false;
let gameOver = false;
let mode = "detailed";
let gameType = "story";

const MODE_HINTS = {
  detailed: "атмосферные описания, детали мира",
  simple: "коротко и по делу: действие — результат",
};

const TYPE_HINTS = {
  story: "скрытая цель, кульминация и финал",
  endless: "открытый мир без финала — исследуй и живи (но умереть можно)",
};

const $ = (id) => document.getElementById(id);
const menu = $("menu"), game = $("game"), logEl = $("log"),
      thinking = $("thinking"), dots = $("dots"),
      inputbar = $("inputbar"), actionInput = $("action"), sendBtn = $("send"),
      statusbar = $("statusbar"), endscreen = $("endscreen");

// кнопки жанров
GENRES.forEach((g) => {
  const b = document.createElement("button");
  b.className = "genre-btn";
  b.innerHTML = "<b>" + g.label + "</b><small>" + g.hint + "</small>";
  b.onclick = () => startGame(g);
  $("genres").appendChild(b);
});

// переключатель режима
function setMode(m) {
  mode = m;
  $("mode-detailed").classList.toggle("active", m === "detailed");
  $("mode-simple").classList.toggle("active", m === "simple");
  $("mode-hint").textContent = MODE_HINTS[m];
}
$("mode-detailed").onclick = () => setMode("detailed");
$("mode-simple").onclick = () => setMode("simple");

// переключатель типа игры
function setType(t) {
  gameType = t;
  $("type-story").classList.toggle("active", t === "story");
  $("type-endless").classList.toggle("active", t === "endless");
  $("type-hint").textContent = TYPE_HINTS[t];
}
$("type-story").onclick = () => setType("story");
$("type-endless").onclick = () => setType("endless");

// анимация точек
setInterval(() => {
  dots.textContent = ".".repeat((dots.textContent.length % 3) + 1);
}, 400);

let skipTyping = false;
const TYPE_SPEED = 18; // мс на символ

function addEntry(role, text) {
  const div = document.createElement("div");
  div.className = "entry " + role;
  logEl.insertBefore(div, thinking);

  // текст игрока и системные — мгновенно
  if (role !== "gm") {
    div.textContent = (role === "player" ? "> " : "") + text;
    logEl.scrollTop = logEl.scrollHeight;
    return Promise.resolve();
  }

  // текст гейм-мастера — печатается по буквам
  skipTyping = false;
  return new Promise((resolve) => {
    let i = 0;
    function tick() {
      if (skipTyping) {
        div.textContent = text;
        logEl.scrollTop = logEl.scrollHeight;
        resolve();
        return;
      }
      i += 1;
      div.textContent = text.slice(0, i) + "▌";
      logEl.scrollTop = logEl.scrollHeight;
      if (i < text.length) {
        setTimeout(tick, TYPE_SPEED);
      } else {
        div.textContent = text;
        resolve();
      }
    }
    tick();
  });
}

// клик по логу — мгновенно допечатать
logEl.addEventListener("click", () => { skipTyping = true; });

function setLoading(v) {
  loading = v;
  thinking.style.display = v ? "block" : "none";
  sendBtn.disabled = v;
  actionInput.disabled = v;
  actionInput.placeholder = v ? "мир думает..." : "что делаешь?";
  logEl.scrollTop = logEl.scrollHeight;
  if (!v && !gameOver) actionInput.focus();
}

function updateStatus(loc) {
  const filled = Math.max(0, Math.min(10, Math.round(hp / 10)));
  const bar = "█".repeat(filled) + "░".repeat(10 - filled);
  const cls = hp > 60 ? "hp-ok" : hp > 30 ? "hp-mid" : "hp-low";
  statusbar.innerHTML = '<span class="' + cls + '">HP [' + bar + "] " + hp + "</span>" +
    (loc ? " · " + escapeHtml(loc) : "") + " · ход " + turn;
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function parseGM(raw) {
  let narrative = raw, status = null, final = null;
  const fm = raw.match(/FINAL:\s*(VICTORY|DEATH)\s*\|\s*(.+)/i);
  if (fm) {
    final = { type: fm[1].toUpperCase(), text: fm[2].trim() };
    narrative = narrative.replace(fm[0], "").trim();
  }
  const sm = raw.match(/STATUS:\s*HP\s*=\s*(\d+)\s*\|\s*(.+)/i);
  if (sm) {
    const v = parseInt(sm[1], 10);
    status = { hp: Math.max(0, Math.min(100, isNaN(v) ? 100 : v)), loc: sm[2].trim() };
    narrative = narrative.replace(sm[0], "").trim();
  }
  return { narrative, status, final };
}

async function callGM() {
  const resp = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: history, mode: mode, gameType: gameType }),
  });
  const data = await resp.json();
  if (!resp.ok || data.error) throw new Error(data.error || "код " + resp.status);
  return (data.text || "").trim();
}

async function startGame(genre) {
  menu.style.display = "none";
  game.style.display = "flex";
  inputbar.style.display = "flex";
  endscreen.style.display = "none";
  document.querySelectorAll("#log .entry").forEach((e) => e.remove());
  history = [];
  hp = 100;
  turn = 0;
  gameOver = false;
  updateStatus("");

  const genreText = genre.id === "random"
    ? "Придумай неожиданный сеттинг сам."
    : "Сеттинг: " + genre.label + " (" + genre.hint + ").";

  history.push({
    role: "user",
    content: "Начни новую игру. " + genreText + " Опиши стартовую сцену: где игрок очнулся, что видит вокруг. Заверши статусом.",
  });

  setLoading(true);
  try {
    const raw = await callGM();
    history.push({ role: "assistant", content: raw });
    const p = parseGM(raw);
    thinking.style.display = "none";
    await addEntry("gm", p.narrative || raw);
    if (p.status) { hp = p.status.hp; updateStatus(p.status.loc); }
  } catch (e) {
    addEntry("sys", "ОШИБКА СВЯЗИ С МИРОМ: " + e.message);
  }
  setLoading(false);
}

async function sendAction() {
  const action = actionInput.value.trim();
  if (!action || loading || gameOver) return;
  actionInput.value = "";
  turn++;
  addEntry("player", action);
  history.push({ role: "user", content: action });

  setLoading(true);
  try {
    const raw = await callGM();
    history.push({ role: "assistant", content: raw });
    const p = parseGM(raw);
    thinking.style.display = "none";
    await addEntry("gm", p.narrative || raw);

    if (p.final) {
      finishGame(p.final);
    } else if (p.status) {
      hp = p.status.hp;
      updateStatus(p.status.loc);
      if (hp <= 0) finishGame({ type: "DEATH", text: "Твоё здоровье иссякло." });
    }
  } catch (e) {
    addEntry("sys", "ОШИБКА СВЯЗИ С МИРОМ: " + e.message);
  }
  setLoading(false);
}

function finishGame(final) {
  gameOver = true;
  if (final.type === "DEATH") { hp = 0; updateStatus(""); }
  inputbar.style.display = "none";
  endscreen.className = final.type === "VICTORY" ? "victory" : "death";
  endscreen.style.display = "block";
  $("end-title").textContent = final.type === "VICTORY" ? "★ ПОБЕДА ★" : "☠ ИГРА ОКОНЧЕНА ☠";
  $("end-text").textContent = final.text;
  $("end-turns").textContent = "пройдено ходов: " + turn;
  logEl.scrollTop = logEl.scrollHeight;
}

$("restart").onclick = () => {
  game.style.display = "none";
  menu.style.display = "flex";
  statusbar.innerHTML = "";
};

sendBtn.onclick = sendAction;
actionInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendAction(); });
</script>
</body>
</html>
